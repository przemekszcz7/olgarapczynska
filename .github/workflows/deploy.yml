name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent duplicate concurrent builds targeting the same environment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 1. Build job: Lints standard code and builds the production-ready static assets
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run TypeScript Linter
        run: npm run lint

      - name: Compile and Build App
        run: npm run build
        env:
          VITE_BASE_PATH: './' # Ensures relative paths work seamlessly on subpage urls

      - name: Upload Build Artifact for Deployment
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # 2. Deploy job: Deploys compiled files onto GitHub Pages
  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
